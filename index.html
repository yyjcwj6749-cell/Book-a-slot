<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vape Collection Portal</title>
<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f3f5f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.card{
    background:#fff;
    padding:35px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
    width:340px;
}
h2{
    margin-top:0;
    text-align:center;
}
label{
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-weight:bold;
}
select,button{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}
button{
    margin-top:20px;
    background:#0066cc;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{
    background:#0052a3;
}
#result{
    display:none;
    text-align:center;
}
#result h1{
    font-size:28px;
}
</style>
</head>
<body>

<div class="card" id="booking">
    <h2>Book Collection Slot</h2>

    <label>Date</label>
    <select>
        <option>Monday</option>
        <option>Tuesday</option>
        <option>Wednesday</option>
        <option>Thursday</option>
        <option>Friday</option>
    </select>

    <label>Time</label>
    <select>
        <option>09:00</option>
        <option>11:00</option>
        <option>13:00</option>
        <option>15:00</option>
    </select>

    <button onclick="book()">Book Appointment</button>

    <div id="result">
        <h1>😂</h1>
        <p style="font-size:22px;font-weight:bold;">
            Book a slot on the site to sell the vapes.
        </p>
    </div>
</div>

<script>
function book(){
    document.querySelectorAll("label, select, button").forEach(el => el.style.display="none");
    document.getElementById("result").style.display="block";
}
</script>

</body>
</html>
